<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="스위티푸드 검색순위">
<link rel="apple-touch-icon" href="/static/logo.png">
<link rel="manifest" href="/static/manifest.json">
<title>스위티푸드 검색순위</title>
<style>
:root {
  --pink: #f59e0b;
  --pink2: #f97316;
  --pink-bg: #fffbeb;
  --pink-light: #fef3c7;
  --card: #fff;
  --bg: #fff8f0;
  --text: #2d1f1b;
  --sub: #b09a7a;
  --border: #fef3c7;
  --nav: 56px;
  --red: #ef4444;
  --blue: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; background: linear-gradient(135deg, #fef3c7, #ffedd5); }
body {
  height: 100%; max-width: 430px; margin: 0 auto;
  background: var(--bg); font-family: -apple-system, 'SF Pro Display', 'Noto Sans KR', sans-serif;
  color: var(--text); overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 0 40px rgba(245,158,11,.2);
}

/* ── 헤더 ── */
.hdr {
  background: #fff;
  border-bottom: 1.5px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 30;
}
.hdr-brand { display: flex; align-items: center; gap: 10px; }
.hdr-logo { width: 52px; height: 52px; object-fit: contain; border-radius: 14px; border: 1.5px solid var(--border); }
.hdr-texts .title { font-size: 0.98rem; font-weight: 800; color: var(--pink); }
.hdr-texts .sub { font-size: 0.68rem; color: var(--sub); margin-top: 1px; }
.btn-all {
  display: flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, var(--pink), var(--pink2)); color: #fff;
  border: none; border-radius: 20px;
  padding: 8px 14px; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(245,158,11,.3);
}
.btn-all:disabled { opacity: 0.5; }
.btn-all svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; }

/* progress */
.prog { height: 3px; background: transparent; flex-shrink: 0; }
.prog-bar { height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink2)); width: 0%; transition: width 0.4s; border-radius: 2px; }

/* ── 스크롤 영역 ── */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav) + 8px); }

/* ── 하단 탭 ── */
.bnav {
  height: var(--nav);
  background: #fff;
  border-top: 1.5px solid var(--border);
  display: flex; justify-content: center; gap: 40px;
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  z-index: 30;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bnav-btn {
  flex: none; width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; cursor: pointer;
  color: var(--sub); font-size: 0.65rem; font-weight: 600;
}
.bnav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.bnav-btn.on { color: var(--pink); }

/* ── 페이지 ── */
.page { display: none; padding: 12px; }
.page.on { display: block; }

/* ── 검색창 ── */
.search-wrap {
  display: flex; gap: 8px; margin-bottom: 12px;
  background: var(--card); border-radius: 16px;
  padding: 10px 12px;
  box-shadow: 0 2px 8px rgba(245,158,11,.08);
  border: 1.5px solid var(--border);
}
.search-wrap input {
  flex: 1; border: none; outline: none; font-size: 0.95rem; background: transparent; color: var(--text);
}
.search-wrap input::placeholder { color: var(--sub); }
.btn-search {
  background: linear-gradient(135deg, var(--pink), var(--pink2)); color: #fff; border: none; border-radius: 10px;
  padding: 8px 16px; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-search:disabled { opacity: 0.5; }

/* 빠른결과 칩 */
.chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 10px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; background: var(--card); border-radius: 12px; padding: 8px 14px; box-shadow: 0 2px 6px rgba(245,158,11,.08); text-align: center; border: 1px solid var(--border); }
.chip .cn { font-size: 0.7rem; color: var(--sub); }
.chip .cv { font-size: 0.95rem; font-weight: 800; margin-top: 2px; }

/* ── 상품 카드 ── */
.prod-card { background: var(--card); border-radius: 20px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(245,158,11,.1); border: 1.5px solid var(--border); }

.card-top { display: flex; align-items: center; gap: 10px; padding: 10px 12px 8px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, #fff 60%, #fffbf0); }
.prod-img { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; background: var(--pink-bg); flex-shrink: 0; border: 1.5px solid var(--border); }
.prod-placeholder { width: 42px; height: 42px; border-radius: 12px; background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.prod-meta { flex: 1; }
.prod-name { font-size: 0.95rem; font-weight: 800; color: var(--text); }
.prod-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--pink-light); color: var(--pink); border-radius: 20px; padding: 1px 7px; font-size: 0.63rem; font-weight: 700; margin-top: 2px; }
.prod-badge::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--pink); display: block; }
.btn-one { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 5px 9px; cursor: pointer; color: var(--sub); font-size: 0.72rem; white-space: nowrap; }
.btn-one:active { background: var(--pink-light); color: var(--pink); }

/* 키워드 탭 */
.kw-tabs { display: flex; gap: 5px; padding: 7px 12px 0; overflow-x: auto; scrollbar-width: none; }
.kw-tabs::-webkit-scrollbar { display: none; }
.kw-tab { flex-shrink: 0; padding: 4px 12px; border-radius: 20px; font-size: 0.74rem; font-weight: 600; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; color: var(--sub); }
.kw-tab.on { background: linear-gradient(135deg, var(--pink), var(--pink2)); color: #fff; border-color: transparent; box-shadow: 0 2px 6px rgba(245,158,11,.3); }

/* 메트릭 */
.metrics { padding: 8px 12px 4px; }
.met-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.met-rank { display: flex; flex-direction: column; }
.met-rank .lbl { font-size: 0.62rem; color: var(--sub); margin-bottom: 2px; }
.met-rank .val { font-size: 2rem; font-weight: 900; line-height: 1; color: var(--pink); }
.met-rank .val .u { font-size: 1rem; font-weight: 600; color: var(--text); }
.met-rank .val .none { font-size: 1rem; color: #ccc; }
.met-dl { display: flex; flex-direction: column; align-items: flex-end; }
.met-dl .lbl { font-size: 0.62rem; color: var(--sub); margin-bottom: 2px; }
.met-dl .val { font-size: 1.3rem; font-weight: 900; line-height: 1; color: var(--text); }
.met-dl .val .u { font-size: 0.78rem; font-weight: 600; }
.met-dl .up { color: var(--red); font-size: 0.68rem; }
.met-dl .dn { color: var(--blue); font-size: 0.68rem; }
.met-dl .none { color: #ccc; font-size: 0.9rem; }
.met-row { display: flex; gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
.met-cell { flex: 1; background: #fffcf5; padding: 7px 8px; text-align: center; }
.met-cell .lbl { font-size: 0.6rem; color: var(--sub); margin-bottom: 3px; }
.met-cell .val { font-size: 0.92rem; font-weight: 800; color: var(--text); }
.met-cell .val .u { font-size: 0.7rem; }
.met-cell .val .none { color: #ccc; font-size: 0.78rem; }

/* 경쟁강도 + 시간 */
.card-foot { display: flex; align-items: center; justify-content: space-between; padding: 0 12px 8px; font-size: 0.68rem; color: var(--sub); }
.comp { display: flex; align-items: center; gap: 4px; }
.c-very-high { color: var(--red); font-weight: 800; }
.c-high { color: #f97316; font-weight: 800; }
.c-mid { color: #f59e0b; font-weight: 800; }
.c-low { color: #10b981; font-weight: 800; }
.c-very-low { color: #059669; font-weight: 800; }

/* ── 설정 탭 ── */
.set-section { background: var(--card); border-radius: 20px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(245,158,11,.08); border: 1.5px solid var(--border); }
.set-title { font-size: 0.72rem; font-weight: 700; color: var(--pink); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 14px 4px; }
.set-add { display: flex; flex-direction: column; gap: 8px; padding: 8px 14px 12px; }
.set-add input { border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 14px; font-size: 0.9rem; background: var(--bg); outline: none; -webkit-appearance: none; width: 100%; }
.set-add input:focus { border-color: var(--pink); background: #fff; }
.set-add .btn-add { background: linear-gradient(135deg, var(--pink), var(--pink2)); color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(245,158,11,.3); }

/* 상품 행 (설정) */
.prod-row { border-top: 1px solid var(--border); }
.prod-row-hdr { display: flex; align-items: center; padding: 12px 14px; gap: 10px; }
.prod-row-hdr .pn { flex: 1; font-weight: 700; font-size: 0.92rem; }
.prod-row-hdr .btn-del-p { background: none; border: 1px solid #fca5a5; color: var(--red); border-radius: 8px; padding: 5px 10px; font-size: 0.75rem; cursor: pointer; }

/* 키워드 행 (설정, 상품별) */
.kw-section { background: var(--pink-bg); border-top: 1px solid var(--border); padding: 8px 14px 10px; }
.kw-section-title { font-size: 0.68rem; font-weight: 700; color: var(--pink); margin-bottom: 6px; text-transform: uppercase; }
.kw-add-row { display: flex; gap: 6px; margin-bottom: 8px; }
.kw-add-row input { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 0.85rem; background: #fff; outline: none; -webkit-appearance: none; }
.kw-add-row input:focus { border-color: var(--pink); }
.kw-add-row .btn-kw-add { background: linear-gradient(135deg, var(--pink), var(--pink2)); color: #fff; border: none; border-radius: 10px; padding: 8px 12px; font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
.kw-list { display: flex; flex-direction: column; gap: 4px; }
.kw-item { display: flex; align-items: center; justify-content: space-between; background: #fff; border-radius: 10px; padding: 8px 12px; border: 1px solid var(--border); }
.kw-item .kw-name { font-size: 0.85rem; font-weight: 600; }
.kw-item .btn-kw-del { background: none; border: none; color: #fca5a5; font-size: 0.75rem; cursor: pointer; padding: 2px 6px; }
.kw-item .btn-kw-del:active { color: var(--red); }

/* ── 로딩 ── */
.ov { display: none; position: fixed; inset: 0; background: rgba(245,158,11,.18); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
.ov.show { display: flex; }
.ov-box { background: #fff; border-radius: 24px; padding: 28px 24px; width: 78%; max-width: 280px; text-align: center; box-shadow: 0 8px 32px rgba(245,158,11,.2); border: 1.5px solid var(--border); }
.spin { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 14px; }
@keyframes sp { to { transform: rotate(360deg); } }
.ov-sub { font-size: 0.82rem; color: var(--sub); }
.ov-kw { font-size: 1rem; font-weight: 800; color: var(--pink); margin-top: 6px; }
.ov-p { font-size: 0.73rem; color: #ccc; margin-top: 4px; }

/* ── 토스트 ── */
.toast { position: fixed; bottom: calc(var(--nav) + 10px); left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--pink), var(--pink2)); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; z-index: 300; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 12px rgba(245,158,11,.4); }
.toast.show { opacity: 1; }
.empty { text-align: center; padding: 28px 20px; color: #d4a0c0; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <img class="hdr-logo" src="/static/logo.png" alt="logo">
    <div class="hdr-texts">
      <div class="title">스위티푸드 검색순위</div>
      <div class="sub" id="hdrSub">조회 전</div>
    </div>
  </div>
  <button class="btn-all" id="btnAll" onclick="checkAll()">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    전체조회
  </button>
</div>
<div class="prog"><div class="prog-bar" id="progBar"></div></div>

<div class="scroll" id="scr">

  <!-- 순위현황 -->
  <div class="page on" id="pg-rank">
    <div id="cards"></div>
  </div>

  <!-- 설정 -->
  <div class="page" id="pg-set">
    <div class="set-section" style="margin-bottom:12px">
      <div class="set-title">DB 초기화</div>
      <div style="padding:8px 14px 12px">
        <button onclick="resetDb()" style="width:100%;background:#ef4444;color:#fff;border:none;border-radius:10px;padding:12px;font-size:0.9rem;font-weight:700;cursor:pointer">
          데이터 전체 초기화 (잘못된 키워드 수정)
        </button>
      </div>
    </div>
    <div class="set-section">
      <div class="set-title">상품 추가</div>
      <div class="set-add">
        <input type="text" id="newPN" placeholder="상품명 (예: 키위)">
        <input type="text" id="newPU" placeholder="스마트스토어 URL">
        <button class="btn-add" onclick="addProd()">추가하기</button>
      </div>
      <div id="prodRows"></div>
    </div>
  </div>

</div>

<nav class="bnav">
  <div style="display:flex;justify-content:center;align-items:center;gap:60px;width:100%;height:100%">
    <button class="bnav-btn on" id="nav-rank" onclick="goPage('rank',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      순위현황
    </button>
    <button class="bnav-btn" id="nav-set" onclick="goPage('set',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      설정
    </button>
  </div>
</nav>

<div class="ov" id="ov">
  <div class="ov-box">
    <div class="spin"></div>
    <div class="ov-sub">순위 조회 중...</div>
    <div class="ov-kw" id="ovKw"></div>
    <div class="ov-p" id="ovP"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const EMOJI = ['🍉','🥭','🍎','🍈','🍋','🍊','🍇','🍓','🥝','🍑'];
let fullData = [], prodList = [];

async function init() {
  await loadAll();
  fetch('/api/fetch_images', {method:'POST'}).then(() => loadAll());
}

async function loadAll() {
  const r = await fetch('/api/full_data');
  fullData = await r.json();
  prodList = fullData.map(p => ({id:p.id, name:p.name, url:p.url, image_url:p.image_url}));
  renderCards();
  renderProdRows();
}

// ── 페이지 전환 ──────────────────────────────────────────
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(el => el.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  btn.classList.add('on');
  document.getElementById('scr').scrollTop = 0;
}

// ── 카드 렌더 ─────────────────────────────────────────────
function renderCards() {
  const el = document.getElementById('cards');
  if (!fullData.length) { el.innerHTML = '<div class="empty">설정에서 상품을 추가하세요</div>'; return; }

  el.innerHTML = fullData.map((p, pi) => {
    const kws = p.keywords;
    const today = new Date().toLocaleDateString('ko-KR', {month:'numeric',day:'numeric'});
    const imgHtml = p.image_url
      ? `<img class="prod-img" src="${p.image_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="prod-placeholder" style="display:none">${EMOJI[pi%EMOJI.length]}</div>`
      : `<div class="prod-placeholder">${EMOJI[pi%EMOJI.length]}</div>`;

    const tabsHtml = kws.length
      ? kws.map((k,ki) => `<button class="kw-tab${ki===0?' on':''}" onclick="switchKw(${p.id},${k.id},this)">${k.keyword}</button>`).join('')
      : '<span style="font-size:.75rem;color:#aaa;padding:10px 14px 0;display:block">등록된 키워드 없음</span>';

    const panelsHtml = kws.map((k,ki) => panel(p.id, k, today, ki===0)).join('');

    return `<div class="prod-card">
      <div class="card-top">
        ${imgHtml}
        <div class="prod-meta">
          <div class="prod-name">${p.name}</div>
          <div class="prod-badge">정상</div>
        </div>
        <button class="btn-one" onclick="checkOne(${p.id})">새로고침</button>
      </div>
      <div class="kw-tabs" id="tabs-${p.id}">${tabsHtml}</div>
      <div id="panels-${p.id}">${panelsHtml}</div>
    </div>`;
  }).join('');
}

function panel(pid, k, today, visible) {
  const rank = k.rank ? `${k.rank}<span class="u">위</span>` : `<span class="none">1000위↑</span>`;
  const yr = k.yesterday_rank ? `${k.yesterday_rank}<span class="u">위</span>` : `<span class="none">-</span>`;
  const wk = k.weekly_avg ? `${k.weekly_avg}<span class="u">위</span>` : `<span class="none">-</span>`;

  let dlHtml = `<span class="none">-</span>`;
  if (k.datalab && k.datalab.ratio !== undefined) {
    const t = k.datalab.trend === 'up' ? `<span class="up">↗상승</span>` : `<span class="dn">↘하락</span>`;
    dlHtml = `${k.datalab.ratio}<span class="u">점</span> ${t}`;
  }

  const comp = k.competition || '-';
  const cc = {'매우 높음':'c-very-high','높음':'c-high','보통':'c-mid','낮음':'c-low','매우 낮음':'c-very-low'}[comp]||'';
  const timeStr = k.checked_at ? fmtTime(k.checked_at) : '-';

  return `<div class="kw-panel" id="p-${pid}-${k.id}" style="${visible?'':'display:none'}">
    <div class="metrics">
      <div class="met-main">
        <div class="met-rank">
          <div class="lbl">🔍 검색순위</div>
          <div class="val">${rank}</div>
        </div>
        <div class="met-dl">
          <div class="lbl">📈 검색지수 (${today})</div>
          <div class="val">${dlHtml}</div>
        </div>
      </div>
      <div class="met-row">
        <div class="met-cell">
          <div class="lbl">📅 어제순위</div>
          <div class="val">${yr}</div>
        </div>
        <div class="met-cell">
          <div class="lbl">📊 주간평균</div>
          <div class="val">${wk}</div>
        </div>
        <div class="met-cell">
          <div class="lbl">⚔️ 경쟁강도</div>
          <div class="val"><span class="${cc}" style="font-size:0.78rem">${comp}</span></div>
        </div>
      </div>
    </div>
    <div class="card-foot">
      <div style="color:#bbb">플러스스토어 기준</div>
      <div>⊙ ${timeStr}</div>
    </div>
  </div>`;
}

function switchKw(pid, kid, btn) {
  document.querySelectorAll(`#tabs-${pid} .kw-tab`).forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll(`#panels-${pid} .kw-panel`).forEach(p => p.style.display='none');
  document.getElementById(`p-${pid}-${kid}`).style.display='block';
}

function fmtTime(ts) {
  if (!ts) return '-';
  const d = new Date();
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  return `${h < 12 ? '오전' : '오후'} ${h > 12 ? h - 12 : (h || 12)}:${m}`;
}
function nowKST() {
  const d = new Date();
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  return `${h < 12 ? '오전' : '오후'} ${h > 12 ? h - 12 : (h || 12)}:${m}`;
}

// ── 전체조회 ─────────────────────────────────────────────
async function checkAll() {
  const btn = document.getElementById('btnAll');
  btn.disabled = true;
  showOv('전체 키워드 조회 중...', '잠시만 기다려주세요');
  document.getElementById('progBar').style.width = '40%';

  try {
    const r = await fetch('/api/check_all', {method:'POST'});
    const d = await r.json();
    document.getElementById('progBar').style.width = '100%';
    setTimeout(() => document.getElementById('progBar').style.width='0%', 800);
    document.getElementById('hdrSub').textContent = d.checked_at;
    await loadAll();
    toast('전체 조회 완료!');
  } catch { toast('오류 발생'); }
  finally { hideOv(); btn.disabled = false; }
}

// ── 개별 새로고침 ─────────────────────────────────────────
async function checkOne(pid) {
  showOv('새로고침 중...', '');
  try {
    const r = await fetch(`/api/check_product/${pid}`, {method:'POST'});
    const d = await r.json();
    document.getElementById('hdrSub').textContent = d.checked_at;
    await loadAll();
    toast('새로고침 완료!');
  } catch { toast('오류 발생'); }
  finally { hideOv(); }
}

// ── 검색 ─────────────────────────────────────────────────
async function doSearch() {
  const kw = document.getElementById('srIn').value.trim();
  if (!kw) return;
  const btn = document.getElementById('btnSr');
  btn.disabled = true; btn.textContent = '...';
  showOv(`"${kw}" 검색 중...`, '');

  try {
    const res = await fetch('/api/check_keyword', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({keyword: kw})
    });
    const d = await res.json();
    if (d.error) { toast(d.error); return; }

    const chips = document.getElementById('chips');
    chips.style.display = 'flex';
    chips.innerHTML = d.results.map(r =>
      `<div class="chip"><div class="cn">${r.product_name}</div>
       <div class="cv" style="color:${r.rank?'#1c1c1e':'#aaa'}">${r.rank?r.rank+'위':'1000위↑'}</div></div>`
    ).join('');
    document.getElementById('hdrSub').textContent = d.checked_at;
  } finally {
    hideOv(); btn.disabled = false; btn.textContent = '조회';
  }
}

// ── 설정: 상품 ───────────────────────────────────────────
function renderProdRows() {
  const el = document.getElementById('prodRows');
  if (!fullData.length) { el.innerHTML = '<div class="empty">상품 없음</div>'; return; }

  el.innerHTML = fullData.map((p, pi) => {
    const kwItems = p.keywords.map(k =>
      `<div class="kw-item">
        <span class="kw-name">${k.keyword}</span>
        <button class="btn-kw-del" onclick="delKw(${k.id})">✕ 삭제</button>
      </div>`
    ).join('');

    return `<div class="prod-row">
      <div class="prod-row-hdr">
        <span>${EMOJI[pi%EMOJI.length]}</span>
        <span class="pn">${p.name}</span>
        <button class="btn-del-p" onclick="delProd(${p.id})">삭제</button>
      </div>
      <div class="kw-section">
        <div class="kw-section-title">키워드 관리</div>
        <div class="kw-add-row">
          <input type="text" id="kwIn-${p.id}" placeholder="키워드 입력" onkeydown="if(event.key==='Enter')addKw(${p.id})">
          <button class="btn-kw-add" onclick="addKw(${p.id})">추가</button>
        </div>
        <div class="kw-list">${kwItems || '<div style="font-size:.78rem;color:#aaa;text-align:center;padding:8px">키워드 없음</div>'}</div>
      </div>
    </div>`;
  }).join('');
}

async function addProd() {
  const name = document.getElementById('newPN').value.trim();
  const url = document.getElementById('newPU').value.trim();
  if (!name || !url) { toast('상품명과 URL을 입력하세요'); return; }
  const r = await fetch('/api/products', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,url})});
  const d = await r.json();
  if (d.error) { toast(d.error); return; }
  document.getElementById('newPN').value = '';
  document.getElementById('newPU').value = '';
  await loadAll(); toast('상품 추가 완료');
}

async function delProd(id) {
  if (!confirm('삭제할까요?')) return;
  await fetch('/api/products/'+id, {method:'DELETE'});
  await loadAll(); toast('삭제됐어요');
}

async function addKw(pid) {
  const inp = document.getElementById(`kwIn-${pid}`);
  const kw = inp.value.trim();
  if (!kw) { toast('키워드를 입력하세요'); return; }
  const r = await fetch(`/api/products/${pid}/keywords`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:kw})});
  const d = await r.json();
  if (d.error) { toast(d.error); return; }
  inp.value = '';
  await loadAll(); toast('키워드 추가 완료');
}

async function delKw(kid) {
  await fetch('/api/product_keywords/'+kid, {method:'DELETE'});
  await loadAll(); toast('삭제됐어요');
}

async function resetDb() {
  if (!confirm('DB를 초기화하면 추가한 상품/키워드가 모두 삭제되고 기본값으로 돌아가요. 계속할까요?')) return;
  showOv('DB 초기화 중...', '');
  await fetch('/api/reset_db', {method:'POST'});
  await loadAll();
  hideOv();
  toast('초기화 완료!');
}

// ── 로딩/토스트 ──────────────────────────────────────────
function showOv(kw, p) {
  document.getElementById('ovKw').textContent = kw;
  document.getElementById('ovP').textContent = p;
  document.getElementById('ov').classList.add('show');
}
function hideOv() { document.getElementById('ov').classList.remove('show'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
